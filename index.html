<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DealTrack"/>
<meta name="theme-color" content="#0A0D14"/>
<title>DealTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0D14;--sf:#0F1320;--sf2:#141928;--sf3:#1A2035;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);
  --gold:#C8A96E;--gold-l:#E0C88A;--gold-d:#A8894E;
  --tx:#EAE6DE;--mu:#7A7F8E;--mu2:#444B5A;
  --gr:#6B9E7A;--bl:#5B7CA8;--pu:#8B6B9E;--re:#9E5B5B;--am:#9E7B4B;
  --r:16px;--rs:10px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-sm:0 2px 12px rgba(0,0,0,.3);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;overflow:hidden}
#root{height:100%}

/* ── LOCK ─────────────────────────────── */
#lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px}
.lk-logo{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;color:var(--gold);letter-spacing:2px;margin-bottom:2px}
.lk-tagline{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--mu);margin-bottom:52px}
.lk-label{font-size:11px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:22px}
.dots{display:flex;gap:16px;margin-bottom:32px}
.dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--mu2);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.dot.f{background:var(--gold);border-color:var(--gold);transform:scale(1.3);box-shadow:0 0 12px rgba(200,169,110,.4)}
.dot.e{background:var(--re);border-color:var(--re)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:272px}
.nk{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:17px 10px;font-family:'Inter',sans-serif;font-size:20px;font-weight:400;color:var(--tx);cursor:pointer;text-align:center;-webkit-user-select:none;user-select:none;transition:all .12s;letter-spacing:.5px}
.nk:active{background:var(--sf2);transform:scale(.91);border-color:var(--bd2)}
.nk.del{font-size:16px;color:var(--mu)}
.nk.empty{opacity:0;pointer-events:none}
.lk-err{font-size:11px;color:var(--re);margin-top:16px;min-height:18px;letter-spacing:.5px}
.lk-hint{font-size:10px;color:var(--mu2);margin-top:24px;text-align:center;line-height:2}

/* ── APP SHELL ────────────────────────── */
#app{display:none;flex-direction:column;height:100%}
#app.show{display:flex}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:calc(var(--safe-t) + 13px) 16px 13px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(12px)}
.tb-left h1{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--gold);letter-spacing:1px;line-height:1.2}
.tb-left p{font-size:10px;color:var(--mu);margin-top:2px;letter-spacing:.5px}
.tb-right{display:flex;gap:6px}
.ib{background:none;border:1px solid var(--bd);border-radius:9px;padding:7px;color:var(--mu);cursor:pointer;display:flex;align-items:center;transition:all .15s}
.ib:active{background:var(--sf2)}
.ib.gold{color:var(--gold);border-color:rgba(200,169,110,.3)}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.content{padding:14px 14px calc(var(--safe-b) + 88px)}

/* ── BOTTOM NAV ───────────────────────── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,13,20,.92);border-top:1px solid var(--bd);display:flex;padding:8px 0 calc(var(--safe-b)+4px);z-index:50;backdrop-filter:blur(20px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:3px;color:var(--mu);transition:all .2s;position:relative}
.bni.on{color:var(--gold)}
.bni.on .bni-lbl{color:var(--gold)}
.bni svg{width:21px;height:21px;transition:transform .2s}
.bni.on svg{transform:scale(1.1)}
.bni-lbl{font-size:9.5px;letter-spacing:.3px}
.bni-badge{position:absolute;top:-1px;right:calc(50% - 22px);background:var(--re);color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}

/* ── TABS ─────────────────────────────── */
.tab-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--sf2);border-bottom:1px solid var(--bd);flex-shrink:0}
.tab-wrap::-webkit-scrollbar{display:none}
.tab-row{display:flex;padding:5px 8px;gap:2px;width:max-content}
.tbtn{padding:7px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--mu);cursor:pointer;white-space:nowrap;border:none;background:none;transition:all .15s;letter-spacing:.2px}
.tbtn.on{background:rgba(200,169,110,.12);color:var(--gold);border:1px solid rgba(200,169,110,.2)}

/* ── CARDS ────────────────────────────── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:14px;letter-spacing:.5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.kpi{background:linear-gradient(135deg,var(--sf2),var(--sf3));border:1px solid var(--bd);border-radius:14px;padding:14px}
.kl{font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);margin-bottom:8px}
.kv{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;line-height:1}
.ks{font-size:10px;color:var(--mu);margin-top:4px}

/* ── PROJECT CARDS ────────────────────── */
.proj-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.proj-card:active{border-color:rgba(200,169,110,.35);transform:scale(.99)}
.proj-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.proj-nm{font-weight:600;font-size:14px;line-height:1.3;flex:1;padding-right:8px}
.proj-type-badge{font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.proj-meta{font-size:11px;color:var(--mu);display:flex;justify-content:space-between;margin-bottom:10px}
.pbar{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:2px;transition:width .6s ease}
.pprofit{font-size:11px;font-weight:500;margin-top:7px;display:flex;align-items:center;gap:5px}

/* ── MILESTONE TIMELINE ───────────────── */
.ph-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.ph-dot{width:6px;height:6px;border-radius:50%}
.ph-nm{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;letter-spacing:.5px}
.ph-count{font-size:10px;color:var(--mu);margin-left:auto}
.ms-item{display:flex;gap:12px;margin-bottom:0;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ms-item:last-child{border-bottom:none}
.ms-left{display:flex;flex-direction:column;align-items:center;gap:4px;width:32px;flex-shrink:0}
.ms-dot{width:32px;height:32px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ms-line{width:2px;flex:1;min-height:8px;border-radius:1px}
.ms-body{flex:1;min-width:0;padding-bottom:2px}
.ms-nm{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px}
.ms-dt{font-size:10.5px;color:var(--mu);margin-bottom:6px}
.ms-controls{display:flex;flex-direction:column;gap:5px}
.sel{width:100%;appearance:none;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;color:var(--tx);font-family:'Inter',sans-serif;font-size:12px;outline:none}
.inp{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;color:var(--tx);font-family:'Inter',sans-serif;font-size:12px;outline:none}
.sel:focus,.inp:focus{border-color:rgba(200,169,110,.5)}
.date-inp{background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:7px 11px;color:var(--tx);font-family:'Inter',sans-serif;font-size:12px;outline:none;width:100%}
.date-inp:focus{border-color:rgba(200,169,110,.5)}
.ms-add-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(200,169,110,.06);border:1px dashed rgba(200,169,110,.2);border-radius:9px;color:var(--gold);font-size:12px;cursor:pointer;width:100%;margin-top:10px;justify-content:center}

/* ── FM CHECKLIST ─────────────────────── */
.fm-st{font-size:9.5px;text-transform:uppercase;letter-spacing:1.8px;color:var(--pu);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid rgba(139,107,158,.15)}
.fmi{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:opacity .15s}
.fmi:active{opacity:.7}
.fmcb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.fmcb.on{background:var(--pu);border-color:var(--pu)}
.fmtx{font-size:12.5px;line-height:1.5}
.fmtx.dn{color:var(--mu);text-decoration:line-through}

/* ── BUDGET ───────────────────────────── */
.bkpi{background:var(--sf2);border:1px solid var(--bd);border-radius:12px;padding:13px}
.bkl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);margin-bottom:5px}
.bkv{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
.fee-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fee-row:last-child{border-bottom:none}
.fee-nm{font-size:12.5px;flex:1;padding-right:8px;line-height:1.4}
.fee-val{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--gold)}
.ti{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:6px 9px;color:var(--tx);font-family:'Inter',sans-serif;font-size:12px;outline:none;text-align:right}
.ti:focus{border-color:rgba(200,169,110,.5)}
.team-row{display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.team-row:last-child{border-bottom:none}
.team-role{flex:1;font-size:12.5px}
.profit-chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;gap:4px}

/* ── GANTT ────────────────────────────── */
.gwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gwrap::-webkit-scrollbar{height:3px}
.gwrap::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.gtable{min-width:600px}
.ghdr{display:flex;border-bottom:1px solid var(--bd);background:var(--sf2)}
.ghlbl{width:140px;flex-shrink:0;font-size:9px;color:var(--mu);padding:6px 8px;letter-spacing:.5px}
.ghmos{flex:1;display:flex}
.ghmo{flex:1;font-size:8.5px;color:var(--mu);text-align:center;padding:4px 2px;border-left:1px solid var(--bd);letter-spacing:.3px}
.grow{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.grow:hover{background:rgba(255,255,255,.02)}
.gnm{width:140px;flex-shrink:0;font-size:11px;padding:5px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mu)}
.garea{flex:1;position:relative;height:28px}
.gbar{position:absolute;top:5px;height:18px;border-radius:5px;display:flex;align-items:center;padding:0 5px;overflow:hidden}
.gbar-lbl{font-size:8px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gph-hdr{font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:5px 8px;background:rgba(255,255,255,.025);color:var(--mu);display:flex;align-items:center;gap:5px}
.gtoday{position:absolute;top:0;bottom:0;width:2px;background:rgba(200,169,110,.5);border-radius:1px;pointer-events:none}

/* ── TODOS ────────────────────────────── */
.todo-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.todo-row{display:flex;gap:7px}
.todo-inp{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 13px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;outline:none}
.todo-inp:focus{border-color:rgba(200,169,110,.4)}
.todo-add{background:var(--gold);border:none;border-radius:10px;padding:10px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#0A0D14;cursor:pointer;flex-shrink:0;transition:background .15s}
.todo-add:active{background:var(--gold-l)}
.todo-sels{display:flex;gap:7px}
.tsel{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:9px;padding:8px 10px;color:var(--tx);font-family:'Inter',sans-serif;font-size:12px;outline:none}
.td-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--sf2);border-radius:11px;margin-bottom:7px;border-left:3px solid transparent;transition:opacity .2s}
.td-item.fd{opacity:.4}
.td-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;margin-top:1px}
.td-chk.on{background:var(--gr);border-color:var(--gr)}
.td-body{flex:1;min-width:0}
.td-tx{font-size:13px;line-height:1.4}
.td-tx.st{text-decoration:line-through;color:var(--mu)}
.td-mt{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;align-items:center}
.td-del{background:none;border:none;color:var(--mu);font-size:18px;cursor:pointer;padding:2px;flex-shrink:0;line-height:1}
.td-pin{background:none;border:none;font-size:12px;cursor:pointer;padding:2px;flex-shrink:0}
.pri-b{display:inline-flex;padding:2px 8px;border-radius:10px;font-size:9.5px;font-weight:600;letter-spacing:.3px}
.ptag{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:9.5px;background:rgba(200,169,110,.08);color:var(--gold);border:1px solid rgba(200,169,110,.18)}
.sec-lbl{font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu2);margin:14px 0 8px}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500}

/* ── MODAL ────────────────────────────── */
.movl{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.msheet{background:var(--sf);border-radius:22px 22px 0 0;padding:18px 18px calc(var(--safe-b)+18px);width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.5)}
.mhandle{width:32px;height:3px;background:var(--bd2);border-radius:2px;margin:0 auto 18px}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:18px;letter-spacing:.5px}
.fg{margin-bottom:13px}
.fl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:6px}
.finp{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:11px;padding:12px 14px;color:var(--tx);font-family:'Inter',sans-serif;font-size:14px;outline:none}
.finp:focus{border-color:rgba(200,169,110,.45)}
.mact{display:flex;gap:10px;margin-top:20px}
.btn-p{flex:1;background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;border-radius:11px;padding:14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#0A0D14;cursor:pointer;transition:opacity .15s}
.btn-p:active{opacity:.85}
.btn-s{flex:1;background:transparent;border:1px solid var(--bd);border-radius:11px;padding:14px;font-family:'Inter',sans-serif;font-size:14px;color:var(--mu);cursor:pointer}

/* ── MISC ─────────────────────────────── */
.empty{text-align:center;padding:32px 16px;color:var(--mu);font-size:13px;line-height:1.8}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--mu);font-size:11px;cursor:pointer;margin-bottom:12px;padding:4px 0;-webkit-user-select:none;user-select:none;letter-spacing:.3px}
.delete-proj-btn{background:none;border:1px solid rgba(158,91,91,.3);border-radius:8px;padding:5px 10px;color:var(--re);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer}
.pbar2{height:5px;background:var(--bd);border-radius:3px;margin-bottom:14px;overflow:hidden}
.pfill2{height:100%;border-radius:3px;transition:width .5s ease}
.sbanner{border-radius:11px;padding:11px 13px;margin-bottom:12px;display:flex;gap:9px;align-items:center;font-size:12px}
.sbanner.ok{background:rgba(107,158,122,.1);border:1px solid rgba(107,158,122,.25);color:var(--gr)}
.sbanner.err{background:rgba(158,91,91,.1);border:1px solid rgba(158,91,91,.25);color:var(--re)}

/* ── CHARTS ───────────────────────────── */
.chart-wrap{position:relative;width:100%;overflow:hidden}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:6px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── WATERFALL ────────────────────────── */
.wf-bar{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px;margin-bottom:8px}
.wf-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
.wf-rect{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .5s ease;position:relative}
.wf-lbl{font-size:8.5px;color:var(--mu);text-align:center;letter-spacing:.2px;line-height:1.3}
.wf-val{font-size:8px;color:var(--mu);font-weight:600;text-align:center}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content>*{animation:fadeIn .25s ease forwards}
</style>
</head>
<body>
<div id="root">

<!-- LOCK -->
<div id="lock">
  <div class="lk-logo">DealTrack</div>
  <div class="lk-tagline">M&amp;A Advisory Suite</div>
  <div class="lk-label" id="lk-lbl">Enter your password</div>
  <div class="dots" id="dots"></div>
  <div class="numpad" id="numpad"></div>
  <div class="lk-err" id="lk-err"></div>
  <div class="lk-hint" id="lk-hint"></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <h1 id="tb-title">DealTrack</h1>
      <p id="tb-sub">M&amp;A Advisory Suite</p>
    </div>
    <div class="tb-right">
      <button class="ib" id="sync-btn" onclick="sv('sync')" title="Sync">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 22v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L21 8M3 16l2.64 2.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="ib gold" id="add-btn" style="display:none" onclick="openNewProjModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>

    const body=JSON.stringify({data:JSON.stringify(data)});
    const r=await fetch(`${SB_URL}/rest/v1/dealtrack?id=eq.1&apikey=${SB_KEY}`,{
      method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},

    });

}

function calcP(p){
  const ret=p.fees.filter(f=>f.unit==='mo').reduce((s,f)=>s+f.amt*(f.mos||1),0);
  const fee=p.fees.filter(f=>f.unit==='pct').reduce((s,f)=>s+(f.amt/100)*p.ev,0);
  const rev=ret+fee;
  const tc=p.team.reduce((s,r)=>s+r.rate*r.days,0);
  const ec=p.fees.filter(f=>f.unit==='fix').reduce((s,f)=>s+f.amt,0);
  const cost=tc+ec;
  const net=rev-cost;
  const margin=rev>0?(net/rev)*100:0;
  return{ret,fee,rev,tc,ec,cost,net,margin};
}

          <div style="font-size:12px;font-weight:600;color:${ok2?'var(--gr)':'var(--re)'}"> ${ok2?'▲':'▼'} ${fmt(Math.abs(pr.net))}</div>
          <div style="font-size:10px;color:var(--mu)">${pr.margin.toFixed(1)}% margin</div>

      <div style="display:flex;justify-content:space-between;margin-bottom:6px">

// ── DONUT CHART SVG ───────────────────────────────────────
function buildDonut(items,sz){
  const total=items.reduce((s,i)=>s+i.value,0);
  if(!total)return'';
  const r=sz/2-8,cx=sz/2,cy=sz/2,strokeW=10;
  let c=2*Math.PI*r;
  let offset=0;let arcs='';
  items.forEach(item=>{
    const frac=item.value/total;
    const dash=frac*c;
    const gap=c-dash;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${item.color}" stroke-width="${strokeW}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=dash+1;
  });
  return`<svg width="${sz}" height="${sz}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="${strokeW}"/>
    ${arcs}
  </svg>`;
}

// ── MILESTONES ────────────────────────────────────────────
function rMilestones(el,p,back){
  const pp=pct(p.ms);
  const phases=[...new Set(p.ms.map(m=>m.ph))];
  const done=p.ms.filter(m=>m.s==='done').length;
  const inprog=p.ms.filter(m=>m.s==='in-progress').length;
  const delayed=p.ms.filter(m=>m.s==='delayed').length;

  // Phase options for move/add
  const allPhases=Object.keys(PC);

  let h=back+`<div class="card" style="padding:14px">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
      ${ring(pp,64,'#C8A96E')}
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px">${p.ms.length} Total Milestones</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${done?`<span class="badge" style="background:rgba(107,158,122,.12);color:var(--gr);font-size:10px">${done} Done</span>`:''}
          ${inprog?`<span class="badge" style="background:rgba(200,169,110,.12);color:var(--gold);font-size:10px">${inprog} In Progress</span>`:''}
          ${delayed?`<span class="badge" style="background:rgba(158,91,91,.12);color:var(--re);font-size:10px">${delayed} Delayed</span>`:''}
        </div>
      </div>
    </div>
    <div class="pbar2" style="margin-bottom:0"><div class="pfill2" style="width:${pp}%;background:linear-gradient(90deg,var(--gold-d),var(--gold))"></div></div>
  </div>`;

  phases.forEach(ph=>{
    const phMs=p.ms.filter(m=>m.ph===ph);
    const phDone=phMs.filter(m=>m.s==='done').length;
    h+=`<div class="ph-hdr"><div class="ph-dot" style="background:${PC[ph]||'#C8A96E'}"></div><div class="ph-nm">${ph}</div><span class="ph-count">${phDone}/${phMs.length}</span></div>`;
    phMs.forEach((m,mi)=>{
      const sc=SC[m.s];
      const sym=m.s==='done'?'✓':m.s==='in-progress'?'◆':m.s==='delayed'?'!':'○';
      const isLast=mi===phMs.length-1;
      const du=daysUntil(m.date);
      const duLabel=m.s==='done'?'':(du<0?`${Math.abs(du)}d overdue`:du===0?'Today':`${du}d`);
      h+=`<div class="ms-item">
        <div class="ms-left">
          <div class="ms-dot" style="background:${sc.bg};border-color:${sc.c};color:${sc.c};font-size:${m.s==='done'?'11':'10'}px">${sym}</div>
          ${!isLast?`<div class="ms-line" style="background:${sc.c};opacity:.2"></div>`:''}
        </div>
        <div class="ms-body">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:4px">
            <input class="inp" style="padding:5px 8px;font-size:13px;font-weight:500;margin-top:0;flex:1" value="${esc(m.n)}" onchange="updMS('${p.id}','${m.id}','n',this.value)" placeholder="Milestone name"/>
            <button onclick="deleteMs('${p.id}','${m.id}')" style="background:none;border:none;color:var(--mu2);font-size:17px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;transition:color .15s" onmouseover="this.style.color='var(--re)'" onmouseout="this.style.color='var(--mu2)'">×</button>
          </div>
          <div class="ms-dt" style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
            <span>📅 ${fmtD(m.date)}</span>
            ${duLabel?`<span style="color:${du<0?'var(--re)':du<=7&&m.s!=='done'?'var(--gold)':'var(--mu)'};font-weight:500">${duLabel}</span>`:''}
            ${m.owner?`<span>👤 ${esc(m.owner)}</span>`:''}
          </div>
          <div class="ms-controls">
            <input type="date" class="date-inp" value="${m.date}" onchange="updMS('${p.id}','${m.id}','date',this.value)"/>
            <div style="display:flex;gap:5px">
              <select class="sel" style="flex:1" onchange="updMS('${p.id}','${m.id}','s',this.value)">

              </select>
              <select class="sel" style="flex:1" onchange="updMS('${p.id}','${m.id}','ph',this.value)">
                ${allPhases.map(ph2=>`<option value="${ph2}"${m.ph===ph2?' selected':''}>${ph2}</option>`).join('')}

            </div>
            <input class="inp" placeholder="Assignee (optional)" value="${esc(m.owner||'')}" onchange="updMS('${p.id}','${m.id}','owner',this.value)"/>

      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>

  h+=`<div style="margin-top:4px">

      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add milestone to a new phase

  el.innerHTML=h;
}

function updMS(pid,mid,f,v){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  p.ms=p.ms.map(m=>m.id===mid?{...m,[f]:v}:m);
  S.projects=S.projects.map(x=>x.id===pid?p:x);
  saveData();scheduleSync();updateBadge();rTabs();
  rProject(document.getElementById('content'));
}

function deleteMs(pid,mid){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  if(p.ms.length<=1){alert('A mandate must have at least one milestone.');return;}
  if(!confirm('Delete this milestone?'))return;
  p.ms=p.ms.filter(m=>m.id!==mid);
  S.projects=S.projects.map(x=>x.id===pid?p:x);
  saveData();scheduleSync();rProject(document.getElementById('content'));
}

function addMilestone(pid,ph){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  const nm=prompt('Milestone name:');if(!nm||!nm.trim())return;
  const newMs={id:'ms'+uid(),n:nm.trim(),ph,s:'upcoming',date:today(),owner:'',notes:''};
  const lastIdx=p.ms.map((m,i)=>({m,i})).filter(x=>x.m.ph===ph).pop();
  if(lastIdx){p.ms.splice(lastIdx.i+1,0,newMs);}else{p.ms.push(newMs);}
  S.projects=S.projects.map(x=>x.id===pid?p:x);
  saveData();scheduleSync();rProject(document.getElementById('content'));
}

function addMilestoneNewPhase(pid){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  const ph=prompt('New phase name (e.g. "Integration"):');if(!ph||!ph.trim())return;
  const nm=prompt('First milestone name in this phase:');if(!nm||!nm.trim())return;
  const newMs={id:'ms'+uid(),n:nm.trim(),ph:ph.trim(),s:'upcoming',date:today(),owner:'',notes:''};
  p.ms.push(newMs);
  S.projects=S.projects.map(x=>x.id===pid?p:x);
  saveData();scheduleSync();rProject(document.getElementById('content'));
}

        <span class="fmtx ${item.done?'dn':''}">${esc(item.n)}</span>
      </div>`;
    });
  });
  el.innerHTML=h;
}

function togFM(pid,si,iid){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  p.fmcl=p.fmcl.map((s,i)=>i!==si?s:{...s,items:s.items.map(it=>it.id===iid?{...it,done:!it.done}:it)});
  S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();
  rProject(document.getElementById('content'));
}

// ── GANTT ─────────────────────────────────────────────────
function rGantt(el,p,back){
  const start=new Date(p.start);
  const lastMs=p.ms[p.ms.length-1];
  const end=new Date(p.start);end.setDate(end.getDate()+(lastMs?lastMs.d:180)+45);
  const td=Math.round((end-start)/86400000);
  const months=[];let c=new Date(start.getFullYear(),start.getMonth(),1);
  while(c<=end){months.push(new Date(c));c=new Date(c.getFullYear(),c.getMonth()+1,1);}
  const pxPct=d=>Math.max(0,Math.min(100,(Math.round((new Date(d)-start)/86400000)/td)*100));
  const todayPct=pxPct(today());
  const phases=[...new Set(p.ms.map(m=>m.ph))];

  let h=back+`<div class="card" style="padding:0;overflow:hidden"><div class="gwrap"><div class="gtable">
    <div class="ghdr">
      <div class="ghlbl">MILESTONE</div>
      <div class="ghmos">${months.map(m=>`<div class="ghmo">${m.toLocaleDateString('en-GB',{month:'short',year:'2-digit'})}</div>`).join('')}</div>
    </div>`;

  phases.forEach(ph=>{
    h+=`<div class="gph-hdr"><div style="width:5px;height:5px;border-radius:50%;background:${PC[ph]||'var(--gold)'}"></div>${ph}</div>`;
    p.ms.filter(m=>m.ph===ph).forEach(m=>{
      const sc=SC[m.s];
      const lp=pxPct(m.date);
      const barW=Math.max(1.2,2);
      h+=`<div class="grow">
        <div class="gnm" style="color:${m.s==='done'?'var(--mu)':m.s==='in-progress'?'var(--tx)':'var(--mu)'}">${esc(m.n)}</div>
        <div class="garea">
          <div style="position:absolute;top:0;bottom:0;left:0;right:0">
            <div class="gtoday" style="left:${todayPct}%;opacity:.6"></div>
          </div>
          <div class="gbar" style="left:calc(${lp}% - 2px);width:${barW}%;min-width:6px;background:${sc.c};opacity:${m.s==='upcoming'?.35:1};box-shadow:${m.s==='in-progress'?'0 0 8px '+sc.c+'88':'none'}"></div>
        </div>
      </div>`;
    });
  });
  h+=`</div></div></div>`;
  // Legend
  h+=`<div class="card"><div style="display:flex;flex-wrap:wrap;gap:8px">

function rBudget(el,p,back){
  const pr=calcP(p),ok=pr.net>=0,mp=Math.min(Math.max(pr.margin,0),100);

  // Waterfall chart data
  const wfItems=[
    {l:'Retainer',v:pr.ret,c:'var(--gold)'},
    {l:'Success Fee',v:pr.fee,c:'var(--gold-l)'},
    {l:'Advisor Cost',v:-pr.tc,c:'var(--re)'},
    {l:'External Cost',v:-pr.ec,c:'#7A5B5B'},
    {l:'Net',v:pr.net,c:ok?'var(--gr)':'var(--re)'},
  ];
  const maxAbs=Math.max(...wfItems.map(i=>Math.abs(i.v)));
  const wfH=100;

  let h=back;

  // P&L visual summary
  h+=`<div class="card">
    <div class="ctitle">P&L Summary</div>
    <div class="g2">
      <div class="bkpi"><div class="bkl">Revenue</div><div class="bkv" style="color:var(--gold)">${fmt(pr.rev)}</div></div>
      <div class="bkpi"><div class="bkl">Total Costs</div><div class="bkv" style="color:var(--re)">${fmt(pr.cost)}</div></div>
      <div class="bkpi"><div class="bkl">Net Profit</div><div class="bkv" style="color:${ok?'var(--gr)':'var(--re)'}">${fmt(pr.net)}</div></div>
      <div class="bkpi"><div class="bkl">Margin</div><div class="bkv" style="color:${ok?'var(--gr)':'var(--re)'}">${pr.margin.toFixed(1)}%</div></div>
    </div>
    <div class="pbar2" style="height:6px;margin-bottom:10px"><div class="pfill2" style="width:${mp}%;background:${ok?'linear-gradient(90deg,#4B7E5A,var(--gr))':'linear-gradient(90deg,#7E4B4B,var(--re))'}"></div></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="profit-chip" style="background:${ok?'rgba(107,158,122,.12)':'rgba(158,91,91,.12)'};color:${ok?'var(--gr)':'var(--re)'}">
        ${ok?'✓ Profitable':'✗ Loss-Making'} · ${pr.margin.toFixed(1)}%
      </span>
    </div>
  </div>`;

  // Waterfall chart
  h+=`<div class="card"><div class="ctitle">Revenue Bridge</div>
    <div class="wf-bar">
      ${wfItems.map(i=>{
        const h2=Math.round((Math.abs(i.v)/maxAbs)*wfH);
        const isNeg=i.v<0;
        return`<div class="wf-col">
          <div class="wf-val" style="color:${i.c}">${fmt(Math.abs(i.v))}</div>
          <div class="wf-rect" style="height:${h2}px;background:${i.c};opacity:${isNeg?.7:1};margin-top:${wfH-h2}px"></div>
          <div class="wf-lbl">${i.l}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // EV input
  h+=`<div class="card"><div class="ctitle">Transaction Value</div>
    <input class="inp" type="number" value="${p.ev}" onchange="updEV('${p.id}',this.value)" style="font-size:15px"/>
  </div>`;

  // Revenue
  h+=`<div class="card"><div class="ctitle">Revenue</div>`;
  p.fees.filter(f=>f.unit==='mo').forEach(f=>{
    h+=`<div class="fee-row"><div class="fee-nm">${esc(f.n)}<br><span style="font-size:10px;color:var(--mu)">€/month × months</span></div>
      <div style="display:flex;gap:5px;align-items:center">
        <input class="ti" style="width:78px" type="number" value="${f.amt}" onchange="updFee('${p.id}',${f.id},'amt',this.value)"/>
        <span style="font-size:10px;color:var(--mu)">×</span>
        <input class="ti" style="width:48px" type="number" value="${f.mos||0}" onchange="updFee('${p.id}',${f.id},'mos',this.value)"/>
      </div></div>`;
  });
  p.fees.filter(f=>f.unit==='pct').forEach(f=>{
    h+=`<div class="fee-row"><div class="fee-nm">${esc(f.n)}<br><span style="font-size:10px;color:var(--mu)">% of EV = ${fmt((f.amt/100)*p.ev)}</span></div>
      <div style="display:flex;gap:5px;align-items:center">
        <input class="ti" style="width:68px" type="number" value="${f.amt}" step="0.1" onchange="updFee('${p.id}',${f.id},'amt',this.value)"/>
        <span style="font-size:10px;color:var(--mu)">%</span>
      </div></div>`;
  });
  h+=`<div class="fee-row" style="border-top:1px solid var(--bd2)"><div class="fee-nm" style="font-weight:600">Total Revenue</div><div class="fee-val">${fmt(pr.rev)}</div></div></div>`;

  // Team
  h+=`<div class="card"><div class="ctitle" style="display:flex;justify-content:space-between;align-items:center"><span>Advisor Day Rates</span>
    <button onclick="addTeam('${p.id}')" style="background:none;border:1px solid var(--bd);border-radius:8px;padding:4px 10px;color:var(--mu);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer">+ Add</button>
  </div>`;
  p.team.forEach(r=>{
    h+=`<div class="team-row">
      <div style="flex:1">
        <input class="inp" style="padding:5px 8px;font-size:12px;margin-top:0" value="${esc(r.role)}" onchange="updTeamRole('${p.id}','${r.id}',this.value)"/>
      </div>
      <input class="ti" style="width:70px" type="number" value="${r.rate}" onchange="updTeam('${p.id}','${r.id}','rate',this.value)" title="Day rate €"/>
      <span style="font-size:10px;color:var(--mu)">×</span>
      <input class="ti" style="width:46px" type="number" value="${r.days}" onchange="updTeam('${p.id}','${r.id}','days',this.value)" title="Days"/>
      <span style="font-size:11px;color:var(--re);min-width:48px;text-align:right">${fmt(r.rate*r.days)}</span>
      <button onclick="rmTeam('${p.id}','${r.id}')" style="background:none;border:none;color:var(--mu2);font-size:16px;cursor:pointer;padding:2px;flex-shrink:0">×</button>
    </div>`;
  });
  h+=`<div class="fee-row" style="border-top:1px solid var(--bd2)"><div class="fee-nm" style="font-weight:600">Total Advisor</div><div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--re)">${fmt(pr.tc)}</div></div></div>`;

  // External
  h+=`<div class="card"><div class="ctitle">External Costs</div>`;
  p.fees.filter(f=>f.unit==='fix').forEach(f=>{
    h+=`<div class="fee-row"><div class="fee-nm">${esc(f.n)}<br><span style="font-size:10px;color:${CC[f.cat]||'var(--mu)'}">${f.cat}</span></div>
      <input class="ti" style="width:100px" type="number" value="${f.amt}" onchange="updFee('${p.id}',${f.id},'amt',this.value)"/></div>`;
  });
  h+=`<div class="fee-row" style="border-top:1px solid var(--bd2)"><div class="fee-nm" style="font-weight:600">Total External</div><div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--re)">${fmt(pr.ec)}</div></div></div>`;

  // Sensitivity
  h+=`<div class="card"><div class="ctitle">Sensitivity Analysis</div>`;
  [0.75,1.0,1.25,1.5,2.0].forEach(mult=>{
    const sev=p.ev*mult;
    const srev=p.fees.filter(f=>f.unit==='mo').reduce((s,f)=>s+f.amt*(f.mos||1),0)+p.fees.filter(f=>f.unit==='pct').reduce((s,f)=>s+(f.amt/100)*sev,0);
    const snet=srev-pr.cost;const sm=srev>0?(snet/srev)*100:0;const ok2=snet>=0;
    h+=`<div class="fee-row" style="${mult===1?'background:rgba(200,169,110,.04);border-radius:8px;padding:9px 6px;margin:0 -6px':''}">
      <div><div style="font-size:12px;font-weight:${mult===1?'600':'400'}">${mult===1?'● Base Case':mult<1?'Bear (−25%)':'Bull ×'+mult}</div><div style="font-size:10px;color:var(--mu)">${fmt(sev)} EV</div></div>
      <div style="text-align:right"><div style="font-size:12px;font-weight:600;color:${ok2?'var(--gr)':'var(--re)'}"> ${ok2?'▲':'▼'} ${fmt(Math.abs(snet))}</div><div style="font-size:10px;color:var(--mu)">${sm.toFixed(1)}% margin</div></div>
    </div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
}

function updEV(pid,v){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.ev=parseFloat(v)||0;S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();rProject(document.getElementById('content'));}
function updFee(pid,fid,f,v){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.fees=p.fees.map(x=>x.id===fid?{...x,[f]:parseFloat(v)||0}:x);S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();rProject(document.getElementById('content'));}
function updTeam(pid,rid,f,v){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.team=p.team.map(r=>r.id===rid?{...r,[f]:parseFloat(v)||0}:r);S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();rProject(document.getElementById('content'));}
function updTeamRole(pid,rid,v){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.team=p.team.map(r=>r.id===rid?{...r,role:v}:r);S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();}
function addTeam(pid){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.team.push({id:uid(),role:'New Role',rate:1500,days:0});S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();rProject(document.getElementById('content'));}
function rmTeam(pid,rid){const p=S.projects.find(x=>x.id===pid);if(!p)return;p.team=p.team.filter(r=>r.id!==rid);S.projects=S.projects.map(x=>x.id===pid?p:x);saveData();scheduleSync();rProject(document.getElementById('content'));}

function todoInput(ctx){
  return`<div class="todo-wrap">

function todoList(todos,showTag){
  const open=todos.filter(t=>!t.done).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
  const done=todos.filter(t=>t.done);
  let h='';
  if(!open.length)h+=`<div class="empty" style="padding:16px">No open to-dos. 🎉</div>`;
  open.forEach(t=>{h+=tdItem(t,showTag);});
  if(done.length){h+=`<div class="sec-lbl">Completed (${done.length})</div>`;done.forEach(t=>{h+=tdItem(t,showTag);});}
  return h;
}

function tdItem(t,showTag){
  const p=PR[t.priority]||PR.medium,od=t.dueDate&&!t.done&&t.dueDate<today();
  return`<div class="td-item ${t.done?'fd':''}" style="border-left-color:${p.c}">
    <div class="td-chk ${t.done?'on':''}" onclick="togTD('${t.id}','${t._ctx||''}')">
      ${t.done?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':''}
    </div>
    <div class="td-body">
      <div class="td-tx ${t.done?'st':''}">${esc(t.text)}</div>
      <div class="td-mt">
        <span class="pri-b" style="background:${p.bg};color:${p.c}">${p.l}</span>
        ${t.dueDate?`<span style="font-size:10px;color:${od?'var(--re)':'var(--mu)'}">📅 ${fmtD(t.dueDate)}${od?' ⚠':''}</span>`:''}
        ${showTag&&t._pn?`<span class="ptag">${esc(t._pn)}</span>`:''}
        ${t.pinned?`<span style="font-size:10px;color:var(--gold)">📌</span>`:''}
      </div>
    </div>
    <button class="td-pin" style="color:${t.pinned?'var(--gold)':'var(--mu)'}" onclick="pinTD('${t.id}','${t._ctx||''}')">📌</button>
    <button class="td-del" onclick="rmTD('${t.id}','${t._ctx||''}')">×</button>
  </div>`;
}

function addTD(ctx){
  const ti=document.getElementById('ti-'+ctx);if(!ti||!ti.value.trim())return;
  const t={id:uid(),text:ti.value.trim(),done:false,priority:document.getElementById('tp-'+ctx).value,dueDate:document.getElementById('td-'+ctx).value,createdAt:today(),pinned:false,_ctx:ctx};
  ti.value='';
  if(ctx==='g'){S.gTodos=[t,...S.gTodos];saveData();scheduleSync();render();return;}
  const p=gp();if(p){p.todos=[t,...p.todos];S.projects=S.projects.map(x=>x.id===p.id?p:x);saveData();scheduleSync();rTodos(document.getElementById('content'),p,'');rTabs();}
}
function togTD(id,ctx){
  if(ctx==='g'){S.gTodos=S.gTodos.map(t=>t.id===id?{...t,done:!t.done}:t);}
  else{const p=gp()||S.projects.find(x=>x.todos.some(t=>t.id===id));if(p){p.todos=p.todos.map(t=>t.id===id?{...t,done:!t.done}:t);S.projects=S.projects.map(x=>x.id===p.id?p:x);}}
  saveData();scheduleSync();render();
}
function rmTD(id,ctx){
  if(ctx==='g'){S.gTodos=S.gTodos.filter(t=>t.id!==id);}
  else{const p=gp()||S.projects.find(x=>x.todos.some(t=>t.id===id));if(p){p.todos=p.todos.filter(t=>t.id!==id);S.projects=S.projects.map(x=>x.id===p.id?p:x);}}
  saveData();scheduleSync();render();
}
function pinTD(id,ctx){
  if(ctx==='g'){S.gTodos=S.gTodos.map(t=>t.id===id?{...t,pinned:!t.pinned}:t);}
  else{const p=gp()||S.projects.find(x=>x.todos.some(t=>t.id===id));if(p){p.todos=p.todos.map(t=>t.id===id?{...t,pinned:!t.pinned}:t);S.projects=S.projects.map(x=>x.id===p.id?p:x);}}
  saveData();scheduleSync();render();
}

    <button onclick="confirmWipe()" style="background:none;border:1px solid rgba(158,91,91,.3);border-radius:9px;padding:10px 14px;color:var(--re);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;width:100%;text-align:left">⚠ Wipe All Local Data</button>
  </div>`;

async function manualPull(){
  const dbg=document.getElementById('sync-debug');
  if(dbg)dbg.textContent='Connecting…';
  try{
    const controller=new AbortController();
    setTimeout(()=>{controller.abort();if(dbg)dbg.textContent='❌ Timed out. Try again.';},8000);
    const r=await fetch(`${SB_URL}/rest/v1/dealtrack?id=eq.1&select=data&apikey=${SB_KEY}`,{method:'GET',headers:{'Authorization':'Bearer '+SB_KEY},signal:controller.signal});
    const text=await r.text();
    if(dbg)dbg.textContent=`Status: ${r.status} · ${text.substring(0,120)}`;
    if(!r.ok){showSyncToast('✗ HTTP '+r.status);return;}
    const rows=JSON.parse(text);
    if(rows&&rows.length>0&&rows[0].data){
      const cloud=JSON.parse(rows[0].data);
      if(cloud&&cloud.projects){S.projects=cloud.projects;S.gTodos=cloud.gTodos||[];S.leads=cloud.leads||[];saveData();render();showSyncToast('✓ '+cloud.projects.length+' mandates loaded');if(dbg)dbg.textContent=`✓ ${cloud.projects.length} mandates · ${new Date(cloud.ts).toLocaleString()}`;}
    }else{if(dbg)dbg.textContent='No data found.';showSyncToast('✗ No cloud data');}
  }catch(e){if(dbg)dbg.textContent='Error: '+e.message;showSyncToast('✗ '+e.message);}
}

function exportData(){const blob=new Blob([JSON.stringify({projects:S.projects,gTodos:S.gTodos},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='dealtrack-'+today()+'.json';a.click();URL.revokeObjectURL(url);}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.projects){S.projects=d.projects;S.gTodos=d.gTodos||[];saveData();scheduleSync();render();alert('Imported '+d.projects.length+' mandates.');}else alert('Invalid file.');}catch{alert('Could not parse file.');}};r.readAsText(f);}
function resetPassword(){if(!confirm('Reset password? You will be logged out.'))return;localStorage.removeItem(PK);lockApp();}
function confirmWipe(){if(!confirm('Delete ALL data permanently?'))return;if(!confirm('Are you absolutely sure?'))return;localStorage.removeItem(DATA_KEY);localStorage.removeItem(PK);location.reload();}

function submitProj(){
  const nm=document.getElementById('np-nm').value.trim();
  const tp=document.getElementById('np-tp').value;
  const ev=document.getElementById('np-ev').value;
  const dt=document.getElementById('np-dt').value;
  if(!nm||!ev)return;
  const p=makeProj(nm,tp,ev,dt);S.projects.push(p);saveData();scheduleSync();closeModal();openP(p.id);
}
function closeModal(){document.getElementById('movl').style.display='none';}

// ── RING SVG ──────────────────────────────────────────────
function ring(pct,sz,col){
  const r=(sz-12)/2,cx=sz/2,cy=sz/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  return`<svg width="${sz}" height="${sz}" style="flex-shrink:0">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="8"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="8"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"
      transform="rotate(-90 ${cx} ${cy})" style="filter:drop-shadow(0 0 4px ${col}66)"/>
    <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="${col}" font-size="13" font-family="Cormorant Garamond,serif" font-weight="600">${pct}%</text>
  </svg>`;
}

// ── BD CONSTANTS ──────────────────────────────────────────
const LEAD_STAGES={
  prospect:  {l:'Prospect',    c:'#556070', bg:'rgba(85,96,112,.12)',  order:0},
  qualified: {l:'Qualified',   c:'#5B7CA8', bg:'rgba(91,124,168,.12)', order:1},
  pitch:     {l:'Pitch',       c:'#9E7B4B', bg:'rgba(158,123,75,.12)', order:2},
  proposal:  {l:'Proposal',    c:'#8B6B9E', bg:'rgba(139,107,158,.12)',order:3},
  won:       {l:'Mandate Won', c:'#6B9E7A', bg:'rgba(107,158,122,.12)',order:4},
  lost:      {l:'Lost',        c:'#9E5B5B', bg:'rgba(158,91,91,.12)',  order:5},
  on_hold:   {l:'On Hold',     c:'#7A7F8E', bg:'rgba(122,127,142,.12)',order:6},
};
const LEAD_SOURCES=['Referral','Outbound','Inbound','Conference / Event','Existing Client','Investment Bank','PE Sponsor','Other'];
const LEAD_TYPES=['Sell-Side M&A','Buy-Side M&A','Capital Raise','Restructuring','Fairness Opinion','Other'];

function makeLead(company,contact,type,ev,stage,source,prob){
  return{
    id:uid(),company,contact,type,ev:parseFloat(ev)||0,stage,source,
    prob:parseFloat(prob)||25,
    relationship:'',nextAction:'',nextActionDate:'',
    country:'',sector:'',notes:'',
    interactions:[],todos:[],
    createdAt:today(),
  };
}

function calcLeadRev(l){
  // Estimated advisory revenue based on deal type and EV
  const pct=l.type==='Capital Raise'?0.03:l.type==='Restructuring'?0.02:0.015;
  const retainer=l.type==='Capital Raise'?120000:200000;
  return retainer+(l.ev*pct);
}

function gl(){return S.leads.find(l=>l.id===S.lid);}

// ── BD PIPELINE VIEW ──────────────────────────────────────
function rBD(el){
  const leads=S.leads;
  const activeLeads=leads.filter(l=>l.stage!=='lost');
  const totalWEV=leads.filter(l=>l.stage!=='lost'&&l.stage!=='won').reduce((s,l)=>s+(l.ev*(l.prob/100)),0);
  const totalWRev=leads.filter(l=>l.stage!=='lost'&&l.stage!=='won').reduce((s,l)=>s+(calcLeadRev(l)*(l.prob/100)),0);
  const wonRev=leads.filter(l=>l.stage==='won').reduce((s,l)=>s+calcLeadRev(l),0);
  const stageOrder=['prospect','qualified','pitch','proposal','won','on_hold','lost'];

  let h=`<div class="g2">
    <div class="kpi"><div class="kl">Pipeline Leads</div><div class="kv">${activeLeads.length}</div><div class="ks">${leads.filter(l=>l.stage==='won').length} mandated</div></div>
    <div class="kpi"><div class="kl">Wtd. EV</div><div class="kv" style="color:var(--gold)">${fmt(totalWEV)}</div><div class="ks">Probability-weighted</div></div>
    <div class="kpi"><div class="kl">Wtd. Revenue</div><div class="kv" style="color:var(--gr)">${fmt(totalWRev)}</div><div class="ks">Expected advisory fees</div></div>
    <div class="kpi"><div class="kl">Won Revenue</div><div class="kv" style="color:var(--gold)">${fmt(wonRev)}</div><div class="ks">Mandated this year</div></div>
  </div>`;

  // Funnel visualization
  if(leads.length>0){
    const funnelStages=['prospect','qualified','pitch','proposal'];
    const maxCount=Math.max(...funnelStages.map(s=>leads.filter(l=>l.stage===s).length),1);
    h+=`<div class="card"><div class="ctitle">Pipeline Funnel</div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:4px">`;
    funnelStages.forEach(s=>{
      const st=LEAD_STAGES[s];
      const count=leads.filter(l=>l.stage===s).length;
      const ev=leads.filter(l=>l.stage===s).reduce((sum,l)=>sum+l.ev,0);
      const w=maxCount>0?Math.max(20,(count/maxCount)*100):0;
      h+=`<div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="sv('bd')">
        <div style="width:72px;font-size:10px;color:var(--mu);text-align:right;flex-shrink:0">${st.l}</div>
        <div style="flex:1;height:26px;background:var(--sf2);border-radius:5px;overflow:hidden">
          <div style="height:100%;width:${w}%;background:${st.c};border-radius:5px;opacity:.8;display:flex;align-items:center;padding:0 8px;min-width:28px;transition:width .4s">
            <span style="font-size:10px;color:#fff;font-weight:600;white-space:nowrap">${count>0?count:''}</span>
          </div>
        </div>
        <div style="width:60px;font-size:10px;color:var(--mu);text-align:right;flex-shrink:0">${ev>0?fmt(ev):''}</div>
      </div>`;
    });
    h+=`</div></div>`;
  }

  // Next actions due
  const due=leads.filter(l=>l.nextActionDate&&l.nextActionDate<=today()&&l.stage!=='lost'&&l.stage!=='won');
  if(due.length){
    h+=`<div class="card" style="border-color:rgba(158,91,91,.2)"><div class="ctitle" style="color:var(--re)">⚡ Actions Overdue</div>`;
    due.forEach(l=>{
      h+=`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer" onclick="openLead('${l.id}')">
        <div style="width:6px;height:6px;border-radius:50%;background:var(--re);flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12.5px;font-weight:500">${esc(l.company)}</div>
          <div style="font-size:10px;color:var(--mu)">${esc(l.nextAction||'Follow up')}</div>
        </div>
        <span style="font-size:10px;color:var(--re)">${fmtD(l.nextActionDate)}</span>
      </div>`;
    });
    h+=`</div>`;
  }

  // Leads by stage
  stageOrder.forEach(stage=>{
    const stLeads=leads.filter(l=>l.stage===stage);
    if(!stLeads.length)return;
    const st=LEAD_STAGES[stage];
    h+=`<div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:${st.c};margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid ${st.c}22">${st.l} · ${stLeads.length}</div>`;
    stLeads.forEach(l=>{
      const wrev=calcLeadRev(l)*(l.prob/100);
      const dueDate=l.nextActionDate&&l.nextActionDate<=today();
      h+=`<div style="background:var(--sf);border:1px solid var(--bd);border-left:3px solid ${st.c};border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer;transition:all .15s" onclick="openLead('${l.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
          <div>
            <div style="font-size:13.5px;font-weight:600">${esc(l.company)}</div>
            ${l.contact?`<div style="font-size:10.5px;color:var(--mu);margin-top:2px">👤 ${esc(l.contact)}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div style="font-size:12px;font-weight:600;color:var(--gold)">${fmt(l.ev)}</div>
            <div style="font-size:9.5px;color:var(--mu)">EV</div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px">
          <span style="font-size:9px;padding:2px 7px;border-radius:8px;background:${st.bg};color:${st.c}">${st.l}</span>
          <span style="font-size:9px;padding:2px 7px;border-radius:8px;background:var(--sf2);color:var(--mu)">${esc(l.type)}</span>
          ${l.source?`<span style="font-size:9px;padding:2px 7px;border-radius:8px;background:var(--sf2);color:var(--mu)">${esc(l.source)}</span>`:''}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:48px;height:4px;background:var(--sf2);border-radius:2px;overflow:hidden">
              <div style="height:100%;width:${l.prob}%;background:${l.prob>=70?'var(--gr)':l.prob>=40?'var(--gold)':'var(--mu)'};border-radius:2px"></div>
            </div>
            <span style="font-size:10px;color:var(--mu)">${l.prob}%</span>
            <span style="font-size:10px;color:var(--gr)">→ ${fmt(wrev)}</span>
          </div>
          ${l.nextActionDate?`<span style="font-size:10px;color:${dueDate?'var(--re)':'var(--mu)'}">⚡ ${dueDate?'Overdue':fmtD(l.nextActionDate)}</span>`:''}
        </div>
      </div>`;
    });
  });

  if(!leads.length)h+=`<div class="empty">No leads yet.<br>Tap + to add your first BD lead.</div>`;
  el.innerHTML=h;
}

// ── LEAD DETAIL ───────────────────────────────────────────
function rLeadDetail(el){
  const l=gl();if(!l){el.innerHTML='';return;}
  const st=LEAD_STAGES[l.stage]||LEAD_STAGES.prospect;
  const estRev=calcLeadRev(l);
  const wRev=estRev*(l.prob/100);
  const wEV=l.ev*(l.prob/100);

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="back-btn" onclick="sv('bd')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Pipeline</div>
    <button onclick="deleteLead('${l.id}')" class="delete-proj-btn">Delete</button>
  </div>`;

  // Header card
  h+=`<div class="card" style="border-left:4px solid ${st.c}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <div style="flex:1">
        <input class="inp" style="font-size:17px;font-weight:600;padding:5px 8px;margin-top:0;font-family:'Cormorant Garamond',serif" value="${esc(l.company)}" onchange="updLead('${l.id}','company',this.value)" placeholder="Company name"/>
        <input class="inp" style="font-size:12px;padding:5px 8px;margin-top:5px;color:var(--mu)" value="${esc(l.contact)}" onchange="updLead('${l.id}','contact',this.value)" placeholder="Key contact name"/>
      </div>
    </div>
    <div class="g2" style="margin-bottom:10px">
      <div class="bkpi"><div class="bkl">EV</div><div class="bkv" style="color:var(--gold)">${fmt(l.ev)}</div></div>
      <div class="bkpi"><div class="bkl">Wtd. EV</div><div class="bkv">${fmt(wEV)}</div></div>
      <div class="bkpi"><div class="bkl">Est. Revenue</div><div class="bkv" style="color:var(--gr)">${fmt(estRev)}</div></div>
      <div class="bkpi"><div class="bkl">Wtd. Revenue</div><div class="bkv" style="color:var(--gr)">${fmt(wRev)}</div></div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:5px">Probability — ${l.prob}%</div>
      <div style="display:flex;align-items:center;gap:10px">
        <input type="range" min="0" max="100" step="5" value="${l.prob}" style="flex:1;accent-color:var(--gold)" oninput="updLead('${l.id}','prob',this.value);this.previousElementSibling&&(this.nextElementSibling.textContent=this.value+'%')" onchange="updLead('${l.id}','prob',this.value)"/>
        <span style="font-size:12px;font-weight:600;color:var(--gold);min-width:36px">${l.prob}%</span>
      </div>
    </div>
  </div>`;

  // Deal details
  h+=`<div class="card"><div class="ctitle">Deal Details</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div><div class="fl">Stage</div>
        <select class="finp" style="padding:9px 12px;font-size:13px" onchange="updLead('${l.id}','stage',this.value)">
          ${Object.entries(LEAD_STAGES).map(([k,v])=>`<option value="${k}"${l.stage===k?' selected':''}>${v.l}</option>`).join('')}
        </select>
      </div>
      <div><div class="fl">Deal Type</div>
        <select class="finp" style="padding:9px 12px;font-size:13px" onchange="updLead('${l.id}','type',this.value)">
          ${LEAD_TYPES.map(t=>`<option${l.type===t?' selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div><div class="fl">Estimated EV (€)</div>
        <input class="finp" type="number" style="padding:9px 12px;font-size:13px" value="${l.ev}" onchange="updLead('${l.id}','ev',parseFloat(this.value)||0)" placeholder="e.g. 50000000"/>
      </div>
      <div class="g2" style="margin-bottom:0">
        <div><div class="fl">Sector</div><input class="finp" style="padding:9px 12px;font-size:13px" value="${esc(l.sector||'')}" onchange="updLead('${l.id}','sector',this.value)" placeholder="e.g. Healthcare"/></div>
        <div><div class="fl">Country</div><input class="finp" style="padding:9px 12px;font-size:13px" value="${esc(l.country||'')}" onchange="updLead('${l.id}','country',this.value)" placeholder="e.g. Germany"/></div>
      </div>
      <div><div class="fl">Source</div>
        <select class="finp" style="padding:9px 12px;font-size:13px" onchange="updLead('${l.id}','source',this.value)">
          <option value="">— Select source —</option>
          ${LEAD_SOURCES.map(s=>`<option${l.source===s?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div><div class="fl">Relationship Owner</div>
        <input class="finp" style="padding:9px 12px;font-size:13px" value="${esc(l.relationship||'')}" onchange="updLead('${l.id}','relationship',this.value)" placeholder="e.g. John Smith (MD)"/>
      </div>
    </div>
  </div>`;

  // Next action
  h+=`<div class="card"><div class="ctitle">⚡ Next Action</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div><div class="fl">Action</div>
        <input class="finp" style="padding:9px 12px;font-size:13px" value="${esc(l.nextAction||'')}" onchange="updLead('${l.id}','nextAction',this.value)" placeholder="e.g. Follow up call with CFO"/>
      </div>
      <div><div class="fl">Due Date</div>
        <input type="date" class="finp" style="padding:9px 12px;font-size:13px" value="${l.nextActionDate||''}" onchange="updLead('${l.id}','nextActionDate',this.value)"/>
      </div>
    </div>
  </div>`;

  // Interaction log
  h+=`<div class="card"><div class="ctitle" style="display:flex;justify-content:space-between;align-items:center">
    <span>Interaction Log</span>
    <button onclick="addInteraction('${l.id}')" style="background:none;border:1px solid var(--bd);border-radius:8px;padding:4px 10px;color:var(--mu);font-family:'Inter',sans-serif;font-size:11px;cursor:pointer">+ Log</button>
  </div>`;
  if(!l.interactions||!l.interactions.length){
    h+=`<div style="font-size:12px;color:var(--mu2);padding:8px 0">No interactions logged yet.</div>`;
  }else{
    [...l.interactions].reverse().forEach((i,idx)=>{
      h+=`<div style="padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:9.5px;padding:2px 8px;border-radius:8px;background:var(--sf2);color:var(--mu)">${esc(i.type)}</span>
            <span style="font-size:10px;color:var(--mu)">${fmtD(i.date)}</span>
          </div>
          <button onclick="delInteraction('${l.id}',${l.interactions.length-1-idx})" style="background:none;border:none;color:var(--mu2);cursor:pointer;font-size:14px;padding:0">×</button>
        </div>
        <div style="font-size:12.5px;line-height:1.5;color:var(--tx)">${esc(i.notes)}</div>
        ${i.outcome?`<div style="font-size:10.5px;color:var(--gold);margin-top:3px">→ ${esc(i.outcome)}</div>`:''}
      </div>`;
    });
  }
  h+=`</div>`;

  // Notes
  h+=`<div class="card"><div class="ctitle">Notes</div>
    <textarea class="finp" style="min-height:100px;resize:vertical;font-size:13px;line-height:1.6" placeholder="Deal thesis, key considerations, sensitivities…" onchange="updLead('${l.id}','notes',this.value)">${esc(l.notes||'')}</textarea>
  </div>`;

  // To-Dos
  h+=`<div class="card"><div class="ctitle">To-Dos</div>
    ${todoInputLead(l.id)}
    ${todoListLead(l)}
  </div>`;

  // Convert to mandate button
  if(l.stage==='won'||l.stage==='proposal'){
    h+=`<div style="margin-bottom:12px">
      <button onclick="convertToMandate('${l.id}')" style="width:100%;background:linear-gradient(135deg,var(--gold-d),var(--gold));border:none;border-radius:12px;padding:14px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;color:#0A0D14;cursor:pointer">
        🎯 Convert to Active Mandate
      </button>
    </div>`;
  }

  el.innerHTML=h;
}

function updLead(lid,field,value){
  S.leads=S.leads.map(l=>l.id===lid?{...l,[field]:field==='prob'||field==='ev'?parseFloat(value)||0:value}:l);
  saveData();scheduleSync();
  // Partial re-render for most fields to avoid losing focus
  if(field==='stage'||field==='prob'||field==='ev')rLeadDetail(document.getElementById('content'));
}

function deleteLead(lid){
  if(!confirm('Delete this lead?'))return;
  S.leads=S.leads.filter(l=>l.id!==lid);
  saveData();scheduleSync();sv('bd');
}

function addInteraction(lid){
  document.getElementById('mbody').innerHTML=`
    <div class="mtitle">Log Interaction</div>
    <div class="fg"><label class="fl">Type</label>
      <select class="finp" id="int-type">
        <option>Call</option><option>Meeting</option><option>Email</option><option>Lunch / Dinner</option><option>Conference</option><option>Video Call</option><option>Other</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Date</label><input type="date" class="finp" id="int-date" value="${today()}"/></div>
    <div class="fg"><label class="fl">Notes</label><textarea class="finp" id="int-notes" style="min-height:80px" placeholder="What was discussed…"></textarea></div>
    <div class="fg"><label class="fl">Outcome / Next Step</label><input class="finp" id="int-outcome" placeholder="e.g. Send teaser next week"/></div>
    <div class="mact"><button class="btn-s" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="saveInteraction('${lid}')">Save</button></div>`;
  document.getElementById('movl').style.display='flex';
}

function saveInteraction(lid){
  const type=document.getElementById('int-type').value;
  const date=document.getElementById('int-date').value;
  const notes=document.getElementById('int-notes').value.trim();
  const outcome=document.getElementById('int-outcome').value.trim();
  if(!notes)return;
  S.leads=S.leads.map(l=>l.id===lid?{...l,interactions:[...(l.interactions||[]),{type,date,notes,outcome}]}:l);
  saveData();scheduleSync();closeModal();rLeadDetail(document.getElementById('content'));
}

function delInteraction(lid,idx){
  if(!confirm('Delete this interaction?'))return;
  S.leads=S.leads.map(l=>l.id===lid?{...l,interactions:l.interactions.filter((_,i)=>i!==idx)}:l);
  saveData();scheduleSync();rLeadDetail(document.getElementById('content'));
}

function todoInputLead(lid){
  return`<div class="todo-wrap">
    <div class="todo-row">
      <input class="todo-inp" id="ti-lead" placeholder="Add a to-do…" onkeydown="if(event.key==='Enter')addTDLead('${lid}')"/>
      <button class="todo-add" onclick="addTDLead('${lid}')">Add</button>
    </div>
    <div class="todo-sels">
      <select class="tsel" id="tp-lead"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select>
      <input type="date" class="tsel" id="td-lead" value="${today()}"/>
    </div>
  </div>`;
}

function todoListLead(l){
  const todos=l.todos||[];
  const open=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);
  let h='';
  if(!open.length&&!done.length)h+=`<div class="empty" style="padding:12px">No to-dos yet.</div>`;
  open.forEach(t=>{ h+=tdItemLead(t,l.id); });
  if(done.length){h+=`<div class="sec-lbl">Completed (${done.length})</div>`;done.forEach(t=>{h+=tdItemLead(t,l.id);});}
  return h;
}

function tdItemLead(t,lid){
  const p=PR[t.priority]||PR.medium,od=t.dueDate&&!t.done&&t.dueDate<today();
  return`<div class="td-item ${t.done?'fd':''}" style="border-left-color:${p.c}">
    <div class="td-chk ${t.done?'on':''}" onclick="togTDLead('${lid}','${t.id}')">
      ${t.done?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>':''}
    </div>
    <div class="td-body">
      <div class="td-tx ${t.done?'st':''}">${esc(t.text)}</div>
      <div class="td-mt">
        <span class="pri-b" style="background:${p.bg};color:${p.c}">${p.l}</span>
        ${t.dueDate?`<span style="font-size:10px;color:${od?'var(--re)':'var(--mu)'}">📅 ${fmtD(t.dueDate)}${od?' ⚠':''}</span>`:''}
      </div>
    </div>
    <button onclick="rmTDLead('${lid}','${t.id}')" class="td-del">×</button>
  </div>`;
}

function addTDLead(lid){
  const ti=document.getElementById('ti-lead');if(!ti||!ti.value.trim())return;
  const t={id:uid(),text:ti.value.trim(),done:false,priority:document.getElementById('tp-lead').value,dueDate:document.getElementById('td-lead').value,createdAt:today()};
  ti.value='';
  S.leads=S.leads.map(l=>l.id===lid?{...l,todos:[t,...(l.todos||[])]}:l);
  saveData();scheduleSync();rLeadDetail(document.getElementById('content'));
}
function togTDLead(lid,tid){
  S.leads=S.leads.map(l=>l.id===lid?{...l,todos:(l.todos||[]).map(t=>t.id===tid?{...t,done:!t.done}:t)}:l);
  saveData();scheduleSync();rLeadDetail(document.getElementById('content'));
}
function rmTDLead(lid,tid){
  S.leads=S.leads.map(l=>l.id===lid?{...l,todos:(l.todos||[]).filter(t=>t.id!==tid)}:l);
  saveData();scheduleSync();rLeadDetail(document.getElementById('content'));
}

function convertToMandate(lid){
  const l=S.leads.find(x=>x.id===lid);if(!l)return;
  if(!confirm(`Convert "${l.company}" to an active mandate? This will create a new mandate and mark the lead as Won.`))return;
  const dealType=LEAD_TYPES.includes(l.type)&&['Sell-Side M&A','Buy-Side M&A','Capital Raise'].includes(l.type)?l.type:'Sell-Side M&A';
  const p=makeProj(l.company,dealType,l.ev,today());
  S.projects.push(p);
  S.leads=S.leads.map(x=>x.id===lid?{...x,stage:'won'}:x);
  saveData();scheduleSync();
  openP(p.id);
}

function openNewLeadModal(){
  document.getElementById('mbody').innerHTML=`
    <div class="mtitle">New Lead</div>
    <div class="fg"><label class="fl">Company Name</label><input class="finp" id="nl-co" placeholder="e.g. Müller Industries GmbH" autofocus/></div>
    <div class="fg"><label class="fl">Key Contact</label><input class="finp" id="nl-ct" placeholder="e.g. Klaus Müller, CEO"/></div>
    <div class="fg"><label class="fl">Deal Type</label>
      <select class="finp" id="nl-type">${LEAD_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Estimated EV (€)</label><input class="finp" id="nl-ev" type="number" placeholder="e.g. 50000000"/></div>
    <div class="fg"><label class="fl">Stage</label>
      <select class="finp" id="nl-stage">${Object.entries(LEAD_STAGES).map(([k,v])=>`<option value="${k}">${v.l}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Source</label>
      <select class="finp" id="nl-src"><option value="">— Select —</option>${LEAD_SOURCES.map(s=>`<option>${s}</option>`).join('')}</select>
    </div>
    <div class="fg"><label class="fl">Win Probability (%)</label><input class="finp" id="nl-prob" type="number" min="0" max="100" value="25" placeholder="25"/></div>
    <div class="mact"><button class="btn-s" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="submitLead()">Add Lead</button></div>`;
  document.getElementById('movl').style.display='flex';
}

function submitLead(){
  const co=document.getElementById('nl-co').value.trim();
  if(!co)return;
  const l=makeLead(
    co,
    document.getElementById('nl-ct').value.trim(),
    document.getElementById('nl-type').value,
    document.getElementById('nl-ev').value||0,
    document.getElementById('nl-stage').value,
    document.getElementById('nl-src').value,
    document.getElementById('nl-prob').value||25
  );
  S.leads.push(l);saveData();scheduleSync();closeModal();openLead(l.id);
}

// ── BOOT ─────────────────────────────────────────────────
initLock();
</script>
